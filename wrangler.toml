name = "proxycontroller"
main = "src/index.js"
compatibility_date = "2026-06-03"

# 告诉 Cloudflare 这是一个普通的 Worker
workers_dev = true

# 声明代码中用到的环境变量（用户在部署页面或稍后可以修改）
[vars]
WEB_USER = "admin"
WEB_PASS = "Tt180162160"
PROXY_USER = "proxy"
PROXY_PASS = "Tt180162160"

# 声明 D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "proxy_db"
database_id = "9fb80a74-066b-469a-a142-0b042745c185" # 留空，一键部署向导或后续配置会引导用户绑定他们自己的 D1 数据库
